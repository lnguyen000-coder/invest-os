name: Morning research run

on:
  schedule:
    # 11:45 UTC = 4:45 AM Pacific (winter 3:45 AM) — before US market open,
    # after overnight filings land. Weekdays only.
    - cron: "45 11 * * 1-5"
  workflow_dispatch: {}      # manual "Run workflow" button for testing

permissions:
  contents: write            # commit updated research docs / db back

concurrency:
  group: research-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m src.main

      - name: Commit updated state
        run: |
          git config user.name "research-bot"
          git config user.email "research-bot@users.noreply.github.com"
          git add research/ journal/ state/ docs/
          git diff --cached --quiet || git commit -m "Research run $(date -u +%F)"
          git push

      # If the run itself fails, open/refresh a GitHub issue so it is
      # impossible to silently stop receiving research.
      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "⚠ Research run failed";
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "run-failure"});
            const body = `Run failed on ${new Date().toISOString()}. ` +
              `See the Actions log: ${context.serverUrl}/${context.repo.owner}/` +
              `${context.repo.repo}/actions/runs/${context.runId}`;
            if (issues.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues.data[0].number, body});
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["run-failure"]});
            }
